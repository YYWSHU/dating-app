services:
  db:
    image: postgis/postgis:16-3.4
    container_name: dating-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dating_user
      POSTGRES_PASSWORD: dating_password
      POSTGRES_DB: dating_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating_user -d dating_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
